<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Flow Pro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #FF4B4B;
    --red-light: #FFE8E8;
    --red-mid: #FFB3B3;
    --bg: #F8F9FD;
    --white: #FFFFFF;
    --text: #1A1A2E;
    --text-muted: #9A9AB0;
    --radius: 24px;
    --radius-sm: 16px;
    --shadow: 0 10px 40px rgba(0,0,0,0.04);
    --apple-blue: #007AFF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body { 
    font-family: 'DM Sans', sans-serif; 
    background: var(--bg); 
    color: var(--text);
    display: flex;
    flex-direction: row; /* Desktop default */
    height: 100vh;
    overflow: hidden;
  }

  /* SIDEBAR NAV (Desktop) / BOTTOM NAV (Mobile) */
  nav.sidebar {
    width: 100px;
    background: var(--white);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 0;
    border-right: 1px solid rgba(0,0,0,0.05);
    z-index: 100;
  }

  .nav-item {
    background: none; border: none;
    margin-bottom: 30px; cursor: pointer;
    color: var(--text-muted);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    transition: 0.3s;
  }
  .nav-item.active { color: var(--red); }
  .nav-label { font-size: 11px; font-weight: 700; }

  /* MAIN CONTENT AREA */
  main { 
    flex: 1; 
    padding: 40px; 
    overflow-y: auto; 
    -webkit-overflow-scrolling: touch;
  }
  .view { display: none; width: 100%; max-width: 1200px; margin: 0 auto; }
  .view.active { display: block; animation: fadeIn 0.4s ease; }

  .welcome-header { margin-bottom: 40px; }
  .welcome-text { font-size: 32px; font-weight: 700; }

  .desktop-grid { 
    display: grid; 
    grid-template-columns: 1.2fr 1fr; 
    gap: 30px; 
  }

  /* CARDS */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 40px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }

  /* TIMER */
  .timer-card { text-align: center; }
  .mode-tabs {
    display: inline-flex;
    background: var(--bg);
    padding: 6px;
    border-radius: 40px;
    margin-bottom: 30px;
    width: 100%;
    justify-content: space-between;
  }
  .mode-tab {
    flex: 1;
    padding: 12px 10px; border: none; border-radius: 35px;
    font-weight: 600; cursor: pointer; background: transparent; color: var(--text-muted);
    font-size: 14px;
    white-space: nowrap;
  }
  .mode-tab.active { background: var(--red); color: white; }

  .timer-display {
    font-family: 'DM Mono', monospace;
    font-size: clamp(60px, 15vw, 110px); /* Tamaño fluido */
    font-weight: 500;
    margin: 20px 0; color: var(--text);
  }

  .controls { display: flex; justify-content: center; gap: 20px; align-items: center; }
  .btn-main {
    width: 80px; height: 80px; border-radius: 50%; border: none;
    background: var(--red); color: white; cursor: pointer;
    box-shadow: 0 10px 25px rgba(255,75,75,0.3);
    display: flex; align-items: center; justify-content: center;
  }

  /* TASKS */
  .task-input-group { display: flex; gap: 10px; margin-bottom: 20px; }
  .task-input-group input {
    flex: 1; padding: 15px; border-radius: var(--radius-sm);
    border: 1px solid #EEE; font-family: inherit; font-size: 16px;
    min-width: 0; /* Evita que el input rompa el layout */
  }
  .btn-add {
    padding: 0 20px; border-radius: var(--radius-sm); border: none;
    background: var(--text); color: white; cursor: pointer; font-weight: 600;
  }
  .task-item {
    display: flex; align-items: center; gap: 15px;
    padding: 15px; background: var(--bg);
    border-radius: var(--radius-sm); margin-bottom: 10px;
  }
  .task-item span { overflow-wrap: anywhere; flex: 1; }
  .task-item.completed span { text-decoration: line-through; opacity: 0.5; }
  
  .checkbox { 
    flex-shrink: 0; width: 24px; height: 24px; border-radius: 8px; 
    border: 2px solid var(--red-mid); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .checkbox.checked { background: var(--red); border-color: var(--red); color: white; }

  /* CALENDAR */
  .calendar-card { background: white; border-radius: var(--radius); padding: clamp(15px, 5vw, 30px); box-shadow: var(--shadow); }
  .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .cal-day-name { font-size: 11px; font-weight: 700; color: var(--text-muted); text-align: center; padding-bottom: 10px; text-transform: uppercase; }
  .cal-date {
    aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-radius: 50%; cursor: pointer; font-weight: 500; font-size: 14px; transition: 0.2s;
  }
  .cal-date:hover:not(.empty) { background: var(--bg); }
  .cal-date.today { color: var(--red); font-weight: 700; }
  .cal-date.selected { background: var(--apple-blue) !important; color: white !important; }
  .cal-dot { width: 4px; height: 4px; border-radius: 50%; background: #34C759; margin-top: 2px; }
  .btn-cal { background: none; border: none; color: var(--apple-blue); font-weight: 600; cursor: pointer; font-size: 14px; }

  /* --- RESPONSIVE ADJUSTMENTS --- */
  @media (max-width: 850px) {
    body { flex-direction: column; }
    
    nav.sidebar {
      width: 100%;
      height: 70px;
      flex-direction: row;
      justify-content: space-around;
      padding: 0;
      border-right: none;
      border-top: 1px solid rgba(0,0,0,0.05);
      position: fixed;
      bottom: 0;
    }

    .nav-item { margin-bottom: 0; padding: 10px; }

    main {
      padding: 20px;
      padding-bottom: 90px; /* Espacio para la barra inferior */
    }

    .desktop-grid {
      grid-template-columns: 1fr;
    }

    .welcome-text { font-size: 24px; }
    
    .card { padding: 25px; }
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

  <nav class="sidebar">
    <button class="nav-item active" onclick="goTo('home', this)">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-item" onclick="goTo('stats', this)">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20V14"/></svg>
      <span class="nav-label">Report</span>
    </button>
    <button class="nav-item" onclick="goTo('settings', this)">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      <span class="nav-label">Settings</span>
    </button>
  </nav>

  <main>
    <div class="view active" id="view-home">
      <div class="welcome-header"><h1 class="welcome-text">Welcome back! 👋</h1></div>
      <div class="desktop-grid">
        <div class="card timer-card">
          <div class="mode-tabs">
            <button class="mode-tab active" data-mode="focus" onclick="changeMode('focus')">Focus</button>
            <button class="mode-tab" data-mode="short" onclick="changeMode('short')">Short Break</button>
            <button class="mode-tab" data-mode="long" onclick="changeMode('long')">Long Break</button>
          </div>
          <div class="timer-display" id="timer-display">25:00</div>
          <div class="controls">
            <button class="btn-main" onclick="toggleTimer()" id="play-btn">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>
            </button>
            <button onclick="resetTimer()" style="background:none; border:none; cursor:pointer; color:var(--text-muted)">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
            </button>
          </div>
        </div>
        <div class="card">
          <h2 style="margin-bottom: 20px;">Your Tasks</h2>
          <div class="task-input-group">
            <input type="text" id="task-input" placeholder="What's next?">
            <button class="btn-add" onclick="addTask()">Add</button>
          </div>
          <div id="task-list"></div>
        </div>
      </div>
    </div>

    <div class="view" id="view-stats">
      <div class="welcome-header"><h1 class="welcome-text">Study Report</h1></div>
      <div class="calendar-card">
        <div class="cal-header">
          <h2 id="current-month-year" style="font-size: 18px;">Month Year</h2>
          <div style="display: flex; gap: 10px;">
            <button class="btn-cal" onclick="changeMonth(-1)">Prev</button>
            <button class="btn-cal" onclick="changeMonth(1)">Next</button>
          </div>
        </div>
        <div class="cal-grid" id="calendar-days"></div>
        <div id="day-detail" style="margin-top:30px; padding:20px; background:var(--bg); border-radius:15px; font-weight:500; font-size: 14px;">
          Selecciona un día para ver los detalles.
        </div>
      </div>
    </div>

    <div class="view" id="view-settings">
      <div class="welcome-header"><h1 class="welcome-text">Settings</h1></div>
      <div class="card" style="max-width: 500px; margin: 0 auto;">
        <div class="setting-row">
          <label>Focus Time (min)</label>
          <input type="number" id="input-focus" value="25">
        </div>
        <div class="setting-row">
          <label>Short Break (min)</label>
          <input type="number" id="input-short" value="5">
        </div>
        <div class="setting-row">
          <label>Long Break (min)</label>
          <input type="number" id="input-long" value="15">
        </div>
        <button class="btn-add" style="width:100%; padding:15px; background:var(--red); height: auto;" onclick="saveSettings()">Save Configuration</button>
      </div>
    </div>
  </main>

<script>
  // El JavaScript se mantiene igual funcionalmente, solo aseguramos que el renderizado no rompa nada
  let state = JSON.parse(localStorage.getItem('pomodoroState')) || {
    tasks: [],
    history: {}, 
    settings: { focus: 25, short: 5, long: 15 }
  };

  function saveToStorage() {
    localStorage.setItem('pomodoroState', JSON.stringify(state));
  }

  function goTo(viewId, btn) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(`view-${viewId}`).classList.add('active');
    btn.classList.add('active');
    if(viewId === 'stats') renderCalendar();
    // Scroll al inicio al cambiar de vista en móvil
    document.querySelector('main').scrollTop = 0;
  }

  let timerInterval;
  let currentMode = 'focus';
  let timeLeft = state.settings[currentMode] * 60;
  let isRunning = false;

  function updateTimerDisplay() {
    const mins = Math.floor(timeLeft / 60);
    const secs = timeLeft % 60;
    document.getElementById('timer-display').textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
  }

  function toggleTimer() {
    const btn = document.getElementById('play-btn');
    if (isRunning) {
      clearInterval(timerInterval);
      btn.innerHTML = '<svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>';
    } else {
      timerInterval = setInterval(() => {
        timeLeft--;
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          onTimerComplete();
        }
        updateTimerDisplay();
      }, 1000);
      btn.innerHTML = '<svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
    }
    isRunning = !isRunning;
  }

  function onTimerComplete() {
    if (currentMode === 'focus') {
      const today = new Date().toISOString().split('T')[0];
      state.history[today] = (state.history[today] || 0) + state.settings.focus;
      saveToStorage();
    }
    alert('Session Finished!');
    resetTimer();
  }

  function resetTimer() {
    clearInterval(timerInterval);
    isRunning = false;
    timeLeft = state.settings[currentMode] * 60;
    updateTimerDisplay();
    document.getElementById('play-btn').innerHTML = '<svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>';
  }

  function changeMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`[data-mode="${mode}"]`).classList.add('active');
    resetTimer();
  }

  function renderTasks() {
    const list = document.getElementById('task-list');
    list.innerHTML = '';
    state.tasks.forEach((task, index) => {
      const item = document.createElement('div');
      item.className = `task-item ${task.done ? 'completed' : ''}`;
      item.innerHTML = `
        <div class="checkbox ${task.done ? 'checked' : ''}" onclick="toggleTask(${index})">${task.done ? '✓' : ''}</div>
        <span>${task.text}</span>
        <button onclick="deleteTask(${index})" style="margin-left:auto; background:none; border:none; cursor:pointer; color:var(--text-muted); padding: 5px;">✕</button>
      `;
      list.appendChild(item);
    });
  }

  function addTask() {
    const input = document.getElementById('task-input');
    if (!input.value.trim()) return;
    state.tasks.push({ text: input.value, done: false });
    input.value = '';
    saveToStorage();
    renderTasks();
  }

  function toggleTask(index) {
    state.tasks[index].done = !state.tasks[index].done;
    saveToStorage();
    renderTasks();
  }

  function deleteTask(index) {
    state.tasks.splice(index, 1);
    saveToStorage();
    renderTasks();
  }

  function saveSettings() {
    state.settings.focus = parseInt(document.getElementById('input-focus').value) || 25;
    state.settings.short = parseInt(document.getElementById('input-short').value) || 5;
    state.settings.long = parseInt(document.getElementById('input-long').value) || 15;
    saveToStorage();
    resetTimer();
    alert('Settings Saved!');
  }

  let calDate = new Date();
  function renderCalendar() {
    const grid = document.getElementById('calendar-days');
    const header = document.getElementById('current-month-year');
    grid.innerHTML = '';
    const month = calDate.getMonth();
    const year = calDate.getFullYear();
    header.textContent = new Intl.DateTimeFormat('en-US', { month: 'long', year: 'numeric' }).format(calDate);
    ['S','M','T','W','T','F','S'].forEach(d => {
      const el = document.createElement('div');
      el.className = 'cal-day-name';
      el.textContent = d;
      grid.appendChild(el);
    });
    const firstDay = new Date(year, month, 1).getDay();
    const totalDays = new Date(year, month + 1, 0).getDate();
    for (let i = 0; i < firstDay; i++) {
      grid.appendChild(Object.assign(document.createElement('div'), {className:'cal-date empty'}));
    }
    for (let i = 1; i <= totalDays; i++) {
      const dayEl = document.createElement('div');
      dayEl.className = 'cal-date';
      const dateStr = `${year}-${(month+1).toString().padStart(2,'0')}-${i.toString().padStart(2,'0')}`;
      if (new Date().toISOString().split('T')[0] === dateStr) dayEl.classList.add('today');
      dayEl.innerHTML = `<span>${i}</span>`;
      if (state.history[dateStr]) {
        dayEl.appendChild(Object.assign(document.createElement('div'), {className:'cal-dot'}));
      }
      dayEl.onclick = () => {
        document.querySelectorAll('.cal-date').forEach(d => d.classList.remove('selected'));
        dayEl.classList.add('selected');
        const minutes = state.history[dateStr] || 0;
        document.getElementById('day-detail').innerHTML = `
          <strong>${dateStr}</strong><br>
          Focus Time: ${minutes} min <br>
          Sessions: ${Math.ceil(minutes/(state.settings.focus || 1))}
        `;
      };
      grid.appendChild(dayEl);
    }
  }

  function changeMonth(dir) {
    calDate.setMonth(calDate.getMonth() + dir);
    renderCalendar();
  }

  // Inicialización
  renderTasks();
  updateTimerDisplay();
  document.getElementById('input-focus').value = state.settings.focus;
  document.getElementById('input-short').value = state.settings.short;
  document.getElementById('input-long').value = state.settings.long;
</script>
</body>
</html>
