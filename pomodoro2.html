<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Flow - Desktop</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #FF4B4B;
    --red-light: #FFE8E8;
    --red-mid: #FFB3B3;
    --bg: #F8F9FD;
    --white: #FFFFFF;
    --text: #1A1A2E;
    --text-muted: #9A9AB0;
    --radius: 24px;
    --radius-sm: 16px;
    --shadow: 0 10px 40px rgba(0,0,0,0.04);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: 'DM Sans', sans-serif; 
    background: var(--bg); 
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* SIDEBAR NAV */
  nav.sidebar {
    width: 100px;
    background: var(--white);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 0;
    border-right: 1px solid rgba(0,0,0,0.05);
  }

  .nav-item {
    background: none; border: none;
    margin-bottom: 30px; cursor: pointer;
    color: var(--text-muted);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    transition: 0.3s;
  }
  .nav-item.active { color: var(--red); }
  .nav-label { font-size: 11px; font-weight: 700; }

  /* MAIN CONTENT AREA */
  main {
    flex: 1;
    padding: 40px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  .view { display: none; width: 100%; max-width: 1200px; margin: 0 auto; }
  .view.active { display: block; animation: fadeIn 0.4s ease; }

  /* HEADER CHANGES */
  .welcome-header { margin-bottom: 40px; }
  .welcome-text { font-size: 32px; font-weight: 700; }

  /* LAYOUT GRID FOR DESKTOP */
  .desktop-grid {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 30px;
  }

  /* TIMER CARD */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 40px;
    box-shadow: var(--shadow);
    text-align: center;
  }

  .mode-tabs {
    display: inline-flex;
    background: var(--bg);
    padding: 6px;
    border-radius: 40px;
    margin-bottom: 30px;
  }
  .mode-tab {
    padding: 12px 24px; border: none; border-radius: 35px;
    font-weight: 600; cursor: pointer; background: transparent; color: var(--text-muted);
  }
  .mode-tab.active { background: var(--red); color: white; }

  .timer-display {
    font-family: 'DM Mono', monospace;
    font-size: 110px; font-weight: 500;
    margin: 20px 0; color: var(--text);
  }

  .controls { display: flex; justify-content: center; gap: 20px; align-items: center; }
  .btn-main {
    width: 80px; height: 80px; border-radius: 50%; border: none;
    background: var(--red); color: white; cursor: pointer;
    box-shadow: 0 10px 25px rgba(255,75,75,0.3);
  }

  /* TASKS SECTION (Personalizable) */
  .tasks-container { margin-top: 30px; text-align: left; }
  .task-input-group { display: flex; gap: 10px; margin-bottom: 20px; }
  .task-input-group input {
    flex: 1; padding: 15px; border-radius: var(--radius-sm);
    border: 1px solid #EEE; font-family: inherit;
  }
  .btn-add {
    padding: 0 20px; border-radius: var(--radius-sm); border: none;
    background: var(--text); color: white; cursor: pointer;
  }

  .task-item {
    display: flex; align-items: center; gap: 15px;
    padding: 15px; background: var(--bg);
    border-radius: var(--radius-sm); margin-bottom: 10px;
  }
  .task-item.completed span { text-decoration: line-through; opacity: 0.5; }
  .checkbox { 
    width: 24px; height: 24px; border-radius: 6px; 
    border: 2px solid var(--red-mid); cursor: pointer;
  }
  .checkbox.checked { background: var(--red); border-color: var(--red); position: relative; }
  .checkbox.checked::after { content: '✓'; color: white; position: absolute; left: 4px; top: -2px; }

  /* CALENDAR (Apple Style) */
  .calendar-card { background: white; border-radius: var(--radius); padding: 25px; box-shadow: var(--shadow); }
  .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
  .cal-day-name { font-size: 12px; font-weight: 700; color: var(--red); text-align: center; }
  .cal-date {
    height: 45px; display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-radius: 12px; cursor: pointer; font-weight: 500; position: relative;
  }
  .cal-date:hover { background: var(--bg); }
  .cal-date.selected { background: #007AFF; color: white; } /* Apple Blue */
  .cal-dot { width: 4px; height: 4px; border-radius: 50%; background: #34C759; margin-top: 2px; }

  /* REPORT CARDS */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
  .stat-card { background: white; padding: 20px; border-radius: var(--radius-sm); box-shadow: var(--shadow); }
  .stat-val { font-size: 24px; font-weight: 700; display: block; }
  .stat-lab { font-size: 12px; color: var(--text-muted); }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

  <nav class="sidebar">
    <button class="nav-item active" onclick="goTo('home')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
      <span class="nav-label">Home</span>
    </button>
    <button class="nav-item" onclick="goTo('stats')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20V14"/></svg>
      <span class="nav-label">Report</span>
    </button>
    <button class="nav-item" onclick="goTo('settings')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      <span class="nav-label">Settings</span>
    </button>
  </nav>

  <main>
    <div class="view active" id="view-home">
      <div class="welcome-header">
        <h1 class="welcome-text">Welcome back! 👋</h1>
      </div>

      <div class="desktop-grid">
        <div class="card">
          <div class="mode-tabs">
            <button class="mode-tab active" onclick="setMode('focus')">Focus</button>
            <button class="mode-tab" onclick="setMode('short')">Short Break</button>
            <button class="mode-tab" onclick="setMode('long')">Long Break</button>
          </div>
          <div class="timer-display" id="timer-display">25:00</div>
          <div class="controls">
            <button class="btn-main" onclick="toggleTimer()" id="play-btn">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>
            </button>
            <button class="btn-secondary" onclick="resetTimer()" style="background:none; border:none; cursor:pointer; color:var(--text-muted)">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
            </button>
          </div>
        </div>

        <div class="card" style="text-align: left;">
          <h2 style="margin-bottom: 20px;">Your Tasks</h2>
          <div class="task-input-group">
            <input type="text" id="task-input" placeholder="What are you working on?">
            <button class="btn-add" onclick="addTask()">Add</button>
          </div>
          <div id="task-list">
            </div>
        </div>
      </div>
    </div>

    <div class="view" id="view-stats">
      <div class="welcome-header">
        <h1 class="welcome-text">Study Report</h1>
      </div>
      
      <div class="stats-grid">
        <div class="stat-card"><span class="stat-val" id="stat-sessions">0</span><span class="stat-lab">Sessions</span></div>
        <div class="stat-card"><span class="stat-val" id="stat-time">0h</span><span class="stat-lab">Focus Time</span></div>
        <div class="stat-card"><span class="stat-val">12</span><span class="stat-lab">Best Streak</span></div>
        <div class="stat-card"><span class="stat-val">85%</span><span class="stat-lab">Efficiency</span></div>
      </div>

      <div class="calendar-card">
        <div class="cal-header">
          <h2 id="month-year">March 2026</h2>
          <div style="color: #007AFF; font-weight: 600; cursor: pointer;">Next Month ></div>
        </div>
        <div class="cal-grid" id="calendar-days">
          </div>
        <div id="day-detail" style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #EEE; font-weight: 500;">
          Select a day to see focus details.
        </div>
      </div>
    </div>

    <div class="view" id="view-settings">
        <div class="welcome-header"><h1 class="welcome-text">Settings</h1></div>
        <div class="card" style="max-width: 600px; text-align: left;">
            <div style="margin-bottom: 25px;">
                <label style="display:block; margin-bottom:10px; font-weight:600;">Focus Duration (min)</label>
                <input type="number" id="set-focus" value="25" style="width:100%; padding:12px; border-radius:10px; border:1px solid #DDD;">
            </div>
            <div style="margin-bottom: 25px;">
                <label style="display:block; margin-bottom:10px; font-weight:600;">Short Break (min)</label>
                <input type="number" id="set-short" value="5" style="width:100%; padding:12px; border-radius:10px; border:1px solid #DDD;">
            </div>
            <button class="btn-add" style="width:100%; padding:15px; background:var(--red)" onclick="alert('Settings Saved!')">Save Changes</button>
        </div>
    </div>
  </main>

<script>
  // --- LÓGICA DE NAVEGACIÓN ---
  function goTo(viewName) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(`view-${viewName}`).classList.add('active');
    event.currentTarget.classList.add('active');
    if(viewName === 'stats') renderCalendar();
  }

  // --- LÓGICA DEL TEMPORIZADOR ---
  let timeLeft = 1500;
  let timerId = null;
  let isRunning = false;

  function updateDisplay() {
    const mins = Math.floor(timeLeft / 60);
    const secs = timeLeft % 60;
    document.getElementById('timer-display').textContent = 
      `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
  }

  function toggleTimer() {
    if (isRunning) {
      clearInterval(timerId);
      document.getElementById('play-btn').innerHTML = '<svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>';
    } else {
      timerId = setInterval(() => {
        timeLeft--;
        updateDisplay();
        if(timeLeft <= 0) { clearInterval(timerId); alert("Time is up!"); }
      }, 1000);
      document.getElementById('play-btn').innerHTML = '<svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';
    }
    isRunning = !isRunning;
  }

  function setMode(mode) {
    if(mode === 'focus') timeLeft = 1500;
    else if(mode === 'short') timeLeft = 300;
    else timeLeft = 900;
    
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    updateDisplay();
  }

  function resetTimer() {
    clearInterval(timerId);
    isRunning = false;
    setMode('focus');
    document.getElementById('play-btn').innerHTML = '<svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>';
  }

  // --- LÓGICA DE TAREAS ---
  function addTask() {
    const input = document.getElementById('task-input');
    if (!input.value) return;
    
    const taskDiv = document.createElement('div');
    taskDiv.className = 'task-item';
    taskDiv.innerHTML = `
      <div class="checkbox" onclick="this.classList.toggle('checked'); this.parentElement.classList.toggle('completed')"></div>
      <span>${input.value}</span>
      <button onclick="this.parentElement.remove()" style="margin-left:auto; background:none; border:none; color:red; cursor:pointer;">✕</button>
    `;
    document.getElementById('task-list').appendChild(taskDiv);
    input.value = '';
  }

  // --- LÓGICA CALENDARIO (ESTILO APPLE) ---
  function renderCalendar() {
    const grid = document.getElementById('calendar-days');
    const days = ['S','M','T','W','T','F','S'];
    grid.innerHTML = '';
    
    // Nombres de días
    days.forEach(d => {
      const el = document.createElement('div');
      el.className = 'cal-day-name';
      el.textContent = d;
      grid.appendChild(el);
    });

    // Días del mes (Ejemplo Marzo)
    for(let i = 1; i <= 31; i++) {
      const dayEl = document.createElement('div');
      dayEl.className = 'cal-date';
      if(i === 21) dayEl.classList.add('selected'); // Día de hoy
      dayEl.innerHTML = `<span>${i}</span>${i % 3 === 0 ? '<div class="cal-dot"></div>' : ''}`;
      dayEl.onclick = () => {
        document.querySelectorAll('.cal-date').forEach(d => d.classList.remove('selected'));
        dayEl.classList.add('selected');
        document.getElementById('day-detail').textContent = `On March ${i}, you focused for ${Math.floor(Math.random()*200)} minutes.`;
      };
      grid.appendChild(dayEl);
    }
  }

  updateDisplay();
</script>
</body>
</html>
